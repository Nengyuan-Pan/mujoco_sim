# v6 配置：球轨迹逆放随挥 + Softmin 终端 + 速度最大化 + 软惩罚
# 继承 default.yaml，仅覆盖需要修改的字段

hitting:
  racket_speed: 1.8
  hit_direction: [0.0, -1.0, 0.3]
  workspace_radius: 0.85
  shoulder_pos: [0.0, -0.12, 1.163]
  hit_offset_x_range: [0.10, 0.40]
  hit_offset_y_range: [-0.25, 0.25]
  hit_offset_z_range: [-0.15, 0.30]
  # 随挥参数（v6: 球轨迹逆放，长度由 follow_through_steps × 球速决定）
  follow_through_length: 0.5
  follow_through_steps: 60
  follow_through_v_terminal: 0.3
  # Softmin 参数
  softmin_beta: 5.0
  window_half_ms: 50.0

cost:
  Q_p: [50000.0, 50000.0, 50000.0]
  Q_v: [200.0, 200.0, 200.0]
  R: 0.0001
  Q_qdot: 0.001
  Q_qddot: 0.0005
  Q_du: 0.001
  # v6: 软惩罚参数
  Q_tcp_soft: 5000.0
  tcp_threshold_ratio: 0.8
  Q_qdot_limit: 1000.0
  qdot_limit_ratio: 0.8
  # v6: 速度最大化参数
  Q_v_max: 5000.0
  Q_v_max_eps: 0.01
