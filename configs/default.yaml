# 仿真参数
sim:
  dt: 0.005              # 仿真时间步长（秒），必须与MuJoCo模型timestep一致

# iLQT 参数
ilqt:
  max_iter: 300           # 最大迭代次数
  tol: 1.0e-4             # 收敛阈值
  horizon: 80             # 规划时间步数 N (80*0.005=0.4s)
  mu_min: 1.0e-6
  mu_max: 1.0e10
  mu_init: 0.01
  delta_0: 1.6
  alpha_list:
    - 1.0
    - 0.5
    - 0.25
    - 0.1
    - 0.05
    - 0.01
  lin_eps: 1.0e-6

# 代价权重
cost:
  Q_p: [50000.0, 50000.0, 50000.0]
  Q_v: [200.0, 200.0, 200.0]
  R: 0.0001
  Q_qdot: 0.001                   # 关节速度软平滑（极小值，不压制挥拍）
  Q_qddot: 0.0005                 # 关节加速度软平滑
  Q_du: 0.001                     # 控制变化率软平滑

# 分阶段权重调度（Q_qdot/Q_qddot/Q_du 乘数）
stage_weights:
  far:     # k_hit > 50: 基础平滑
    Q_qdot_mult: 1.0
    Q_qddot_mult: 1.0
    Q_du_mult: 1.0
  mid:     # k_hit 20~50: 中等平滑
    Q_qdot_mult: 2.0
    Q_qddot_mult: 2.0
    Q_du_mult: 2.0
  near:    # k_hit <= 20: 适度平滑，不压制挥拍
    Q_qdot_mult: 0.0
    Q_qddot_mult: 0.0
    Q_du_mult: 0.0

# 初始关节角度（弧度）— UR5e 准备姿势（臂前伸，球拍在前方）
init_q: [0.0, -1.2, 1.8, -0.6, 0.0, 0.0]

# 初始控制猜测（仅作后备，实际使用雅可比转置初始控制）
init_u: [0.0, -20.0, 20.0, -5.0, 0.0, 0.0]

# 网球参数
ball:
  gravity: [0.0, 0.0, -9.81]
  radius: 0.033
  mass: 0.058
  # 发球与弹跳参数
  serve_distance: 22.0          # 发球 X 距离 (m)
  serve_height: [2.5, 3.0]     # 发球高度范围 (m)
  bounce_restitution: 0.75     # 弹跳恢复系数
  target_speed: 5.0           # 到达工作区目标速度 (m/s)
  target_speed_range: [15, 25] # 到达速度范围
  flight_time: 1.0             # 总飞行时间约 (s)

# 击打参数
hitting:
  racket_speed: 5.0
  hit_direction: [0.0, -1.0, 0.3]
  workspace_radius: 0.85
  shoulder_pos: [0.0, -0.12, 1.163]
  hit_offset_x_range: [0.10, 0.40]
  hit_offset_y_range: [-0.25, 0.25]
  hit_offset_z_range: [-0.15, 0.30]

# REALMAN RM65-B 真实机器人硬约束
robot_limits:
  # 关节角度范围 (deg)，读取后统一转 rad
  q_min_deg: [-178, -130, -135, -178, -128, -360]
  q_max_deg: [ 178,  130,  135,  178,  128,  360]
  q_margin_deg: [2, 1, 3, 3, 3, 3]  # J0=2° J1=1° J2-J5=3°(放宽腕关节)

  # 关节速度上限 (deg/s)，读取后统一转 rad/s
  qdot_max_deg_s: [180, 180, 225, 225, 225, 225]
  qdot_scale: 1.0              # 速度安全系数 100%（严格模式）

  # 关节加速度上限 (deg/s²)，读取后统一转 rad/s²
  # 真实机器人值（电机可达到的水平），使用滑动窗口估算
  qddot_max_deg_s2: [400, 400, 500, 500, 500, 500]
  qddot_scale: 0.85               # 加速度安全系数 85%
  qddot_window: 5                # 滑动窗口步数（5步=25ms@200Hz，等效40Hz低通）
  qddot_hard_reject: false       # Phase1: false=仅日志+软代价；Phase2: true=硬拒绝
  qdot_window: 3                 # qdot 滑动窗口步数（用于qddot估算）

  # 扭矩限制 (Nm)，null = 自动从 MuJoCo actuator_ctrlrange 读取
  u_min: null
  u_max: null

  # 前向传递约束检查的 alpha 回退列表
  alpha_fallback: [0.5, 0.3, 0.2, 0.1, 0.05]

  # 前向传递中的约束裕度（>1.0 放宽搜索空间，执行层仍严格检查）
  forward_pass_margin: 1.0
  forward_pass_q_tol_deg: 0.0     # 前向传递 q 额外容忍度 (deg)，0=严格

  # TCP 线速度硬限制 (m/s)
  max_tcp_speed: 1.8

  # 位置模式下单步角度变化量限制
  # dq_max = qdot_max * dt * dq_max_fraction（自动计算）
  dq_max_fraction: 0.5

# 执行器模式配置
actuator:
  mode: "torque"             # "torque" 或 "position"
  # exp10 精调最优参数（uniform 比例, Kp=20, Kd_ratio=0.08）
  # 3360 runs 验证：100% 命中率，pos_err=52mm，TCP=2.51 m/s
  kp: [20.0, 20.0, 20.0, 20.0, 20.0, 20.0]
  kd: [1.6, 1.6, 1.6, 1.6, 1.6, 1.6]

# 可视化参数
viewer:
  camera_distance: 2.5
  camera_elevation: -20
  camera_azimuth: 135
  camera_lookat: [0.0, 0.0, 1.0]
  playback_speed: 1.0
  loop: true
